backend:
  name: github
  repo: remichauvinproduction-web/siteweb
  branch: main
  base_url: https://remiproduction.fr
  auth_endpoint: /oauth/callback
media_folder: images
public_folder: /images
collections:
- name: gallery
  label: Galerie de réalisations
  files:
  - name: gallery
    label: Photos de la galerie
    file: gallery.json
    fields:
    - label: Photos
      name: items
      widget: list
      label_singular: Photo
      summary: '{{fields.label}} ({{fields.category}})'
      fields:
      - label: Image
        name: image
        widget: image
      - label: Catégorie
        name: category
        widget: select
        options:
        - label: Portrait
          value: portrait
        - label: Événement
          value: evenement
        - label: Sport
          value: sport
        - label: Nature
          value: nature
      - label: Légende affichée
        name: label
        widget: string
        hint: 'Ex : Portrait · Studio'
      - label: Texte alternatif (accessibilité / SEO)
        name: alt
        widget: string
- name: site_images
  label: Images fixes du site
  files:
  - name: fixed_images
    label: Images principales
    file: site-images.json
    fields:
    - label: Page d'accueil
      name: accueil
      widget: object
      fields:
      - label: Photo de fond (hero)
        name: hero
        widget: image
      - label: Vignette vidéo — Camping
        name: video_camping
        widget: image
      - label: Vignette vidéo — Nature
        name: video_nature
        widget: image
      - label: Photo mise en avant (moto)
        name: moto
        widget: image
    - label: Page À propos
      name: a_propos
      widget: object
      fields:
      - label: Portrait de Rémi
        name: portrait
        widget: image
    - label: Page Services
      name: services
      widget: object
      fields:
      - label: Exemple — Portrait studio
        name: exemple_portrait
        widget: image
      - label: Exemple — Vidéo entreprise
        name: exemple_video
        widget: image
      - label: Exemple — Prise de vue drone
        name: exemple_drone
        widget: image
    - label: Général
      name: general
      widget: object
      fields:
      - label: Logo du site
        name: logo
        widget: image
- name: videos
  label: Vidéos & Films
  files:
  - name: videos
    label: Liste des vidéos
    file: videos.json
    fields:
    - label: Vidéos
      name: items
      widget: list
      label_singular: Vidéo
      summary: '{{fields.title}}'
      fields:
      - label: ID YouTube
        name: youtube_id
        widget: string
        hint: 'Colle ici l''ID YouTube uniquement (ex: dQw4w9WgXcQ depuis youtube.com/watch?v=dQw4w9WgXcQ). Laisse vide si la vidéo n''est pas encore en ligne.'
        required: false
      - label: Vignette
        name: thumbnail
        widget: image
      - label: Tag / Catégorie
        name: tag
        widget: string
        hint: 'Ex: Film promotionnel · Camping · Drone'
      - label: Titre
        name: title
        widget: string
      - label: Description courte
        name: description
        widget: text
- name: site_content
  label: Textes du site
  files:
  - name: content
    label: Tous les textes
    file: site-content.json
    fields:
    - label: Textes communs (toutes les pages)
      name: global
      widget: object
      fields:
      - label: Texte du bouton principal ("Démarrer un projet")
        name: cta_label
        widget: string
      - label: Slogan du footer
        name: footer_tagline
        widget: string
      - label: Copyright du footer
        name: footer_copyright
        widget: string
    - label: Page d'accueil
      name: accueil
      widget: object
      fields:
      - label: Kicker du hero
        name: hero_kicker
        widget: string
      - label: Titre — ligne 1
        name: hero_title_line1
        widget: string
      - label: Titre — ligne 2 (en accent)
        name: hero_title_line2
        widget: string
      - label: Sous-titre du hero
        name: hero_subtitle
        widget: text
      - label: Bouton principal
        name: hero_cta_primary
        widget: string
      - label: Bouton secondaire
        name: hero_cta_secondary
        widget: string
      - label: Badge de confiance 1
        name: hero_trust_1
        widget: string
      - label: Badge de confiance 2
        name: hero_trust_2
        widget: string
      - label: Badge de confiance 3
        name: hero_trust_3
        widget: string
      - label: Chiffres clés
        name: stats
        widget: list
        fields:
        - label: Chiffre
          name: number
          widget: string
        - label: Légende
          name: label
          widget: string
      - label: Kicker galerie
        name: gallery_kicker
        widget: string
      - label: Titre galerie (HTML autorisé)
        name: gallery_title
        widget: text
      - label: Sous-titre galerie
        name: gallery_subtitle
        widget: text
      - label: Texte bouton "voir toutes les photos"
        name: gallery_cta
        widget: string
      - label: Kicker services
        name: services_kicker
        widget: string
      - label: Titre services (HTML autorisé)
        name: services_title
        widget: text
      - label: Cartes services
        name: services
        widget: list
        fields:
        - label: Nom
          name: name
          widget: string
        - label: Description
          name: desc
          widget: text
      - label: Texte bouton "voir les tarifs"
        name: services_cta
        widget: string
      - label: Kicker processus
        name: process_kicker
        widget: string
      - label: Titre processus (HTML autorisé)
        name: process_title
        widget: text
      - label: Sous-titre processus
        name: process_subtitle
        widget: text
      - label: Étapes du processus
        name: process_steps
        widget: list
        fields:
        - label: Titre
          name: title
          widget: string
        - label: Description
          name: desc
          widget: text
      - label: Kicker FAQ
        name: faq_kicker
        widget: string
      - label: Titre FAQ (HTML autorisé)
        name: faq_title
        widget: text
      - label: Questions fréquentes
        name: faq_items
        widget: list
        fields:
        - label: Question
          name: question
          widget: string
        - label: Réponse (HTML autorisé)
          name: answer
          widget: text
      - label: Kicker CTA final
        name: cta_final_kicker
        widget: string
      - label: Titre CTA final (HTML autorisé)
        name: cta_final_title
        widget: text
      - label: Sous-titre CTA final
        name: cta_final_subtitle
        widget: text
    - label: Page À propos
      name: a_propos
      widget: object
      fields:
      - label: Kicker hero
        name: hero_kicker
        widget: string
      - label: Titre hero (HTML autorisé)
        name: hero_title
        widget: string
      - label: Kicker introduction
