backend:
  name: github
  repo: remichauvinproduction-web/siteweb
  branch: main
  base_url: https://remiproduction.fr
  auth_endpoint: /oauth/callback

media_folder: "images"
public_folder: "/images"

collections:

  # ── 1. GALERIE LIBRE (page Réalisations + aperçu page d'accueil) ──
  - name: "gallery"
    label: "Galerie de réalisations"
    files:
      - name: "gallery"
        label: "Photos de la galerie"
        file: "gallery.json"
        fields:
          - label: "Photos"
            name: "items"
            widget: "list"
            label_singular: "Photo"
            summary: "{{fields.label}} ({{fields.category}})"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - label: "Catégorie"
                name: "category"
                widget: "select"
                options:
                  - { label: "Portrait", value: "portrait" }
                  - { label: "Événement", value: "evenement" }
                  - { label: "Sport", value: "sport" }
                  - { label: "Nature", value: "nature" }
              - label: "Légende affichée"
                name: "label"
                widget: "string"
                hint: "Ex : Portrait · Studio"
              - label: "Texte alternatif (accessibilité / SEO)"
                name: "alt"
                widget: "string"

  # ── 2. IMAGES FIXES DU SITE ──
  - name: "site_images"
    label: "Images fixes du site"
    files:
      - name: "fixed_images"
        label: "Images principales"
        file: "site-images.json"
        fields:
          - label: "Page d'accueil"
            name: "accueil"
            widget: "object"
            fields:
              - { label: "Photo de fond (hero)", name: "hero", widget: "image" }
              - { label: "Vignette vidéo — Camping", name: "video_camping", widget: "image" }
              - { label: "Vignette vidéo — Nature", name: "video_nature", widget: "image" }
              - { label: "Photo mise en avant (moto)", name: "moto", widget: "image" }
          - label: "Page À propos"
            name: "a_propos"
            widget: "object"
            fields:
              - { label: "Portrait de Rémi", name: "portrait", widget: "image" }
          - label: "Page Services"
            name: "services"
            widget: "object"
            fields:
              - { label: "Exemple — Portrait studio", name: "exemple_portrait", widget: "image" }
              - { label: "Exemple — Vidéo entreprise", name: "exemple_video", widget: "image" }
              - { label: "Exemple — Prise de vue drone", name: "exemple_drone", widget: "image" }
          - label: "Général"
            name: "general"
            widget: "object"
            fields:
              - { label: "Logo du site", name: "logo", widget: "image" }

  # ── 3. VIDÉOS ──
  - name: "videos"
    label: "Vidéos & Films"
    files:
      - name: "videos"
        label: "Liste des vidéos"
        file: "videos.json"
        fields:
          - label: "Vidéos"
            name: "items"
            widget: "list"
            label_singular: "Vidéo"
            summary: "{{fields.title}}"
            fields:
              - label: "ID YouTube"
                name: "youtube_id"
                widget: "string"
                hint: "Colle ici l'ID YouTube uniquement (ex: dQw4w9WgXcQ depuis youtube.com/watch?v=dQw4w9WgXcQ). Laisse vide si la vidéo n'est pas encore en ligne."
                required: false
              - { label: "Vignette", name: "thumbnail", widget: "image" }
              - { label: "Tag / Catégorie", name: "tag", widget: "string", hint: "Ex: Film promotionnel · Camping · Drone" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description courte", name: "description", widget: "text" }
